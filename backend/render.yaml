services:
  - type: web
    name: library-card-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        sync: false # Supabase PostgreSQL connection string
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false # e.g., .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false # e.g., https://your-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false # e.g., https://your-backend.onrender.com
      - key: PUBLIC_URL
        sync: false # e.g., https://your-backend.onrender.com
      - key: MEDIA_STORAGE_BACKEND
        value: "supabase"
      - key: SUPABASE_URL
        sync: false # e.g., https://xxx.supabase.co
      - key: SUPABASE_S3_ACCESS_KEY
        sync: false # from Supabase > Project Settings > Storage > S3 Access Keys
      - key: SUPABASE_S3_SECRET_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: "media"
      - key: SUPABASE_S3_REGION
        sync: false # e.g., eu-central-1
      - key: REVALIDATION_URL
        sync: false # e.g., https://your-frontend.vercel.app/api/revalidate
      - key: REVALIDATION_SECRET
        sync: false # Shared secret with Vercel
      - key: PYTHON_VERSION
        value: "3.12.0"
